version: "3.8"

services:
  studio:
    build:
      context: ..
      dockerfile: apps/studio/Dockerfile
      target: dev
    ports:
      - 8082:8082
    develop:
      watch:
        - action: sync
          path: ../apps/studio
          target: /app/apps/studio
          ignore:
            - node_modules/
        - action: rebuild
          path: package.json

  mail:
    container_name: supabase-mail
    image: inbucket/inbucket:3.0.3
    ports:
      - '2500:2500' # SMTP
      - '9000:9000' # web interface
      - '1100:1100' # POP3
  auth:
    environment:
      - GOTRUE_SMTP_USER=
      - GOTRUE_SMTP_PASS=
  meta:
    ports:
      - 5555:8080
  db:
    restart: 'no'
    volumes:
      # Removed: anonymous volume `- /var/lib/postgresql/data` which the
      # upstream Supabase template used to force a fresh DB on every
      # `docker compose up`. That behavior caused silent dev data loss on
      # every restart and contradicted this project's persistence requirements.
      # Dev now inherits the bind mount
      # `./volumes/db/data:/var/lib/postgresql/data:Z` from
      # supabase/docker-compose.yml, matching production semantics.
      # To explicitly wipe local dev data, run `bash supabase/reset.sh`
      # (interactive, requires typed confirmation).
      # Seed data still applies on first init.
      - ./dev/data.sql:/docker-entrypoint-initdb.d/seed.sql
  # NOTE: the `storage:` block previously here also overrode the storage
  # bind mount with an anonymous volume (`- /var/lib/storage`), causing the
  # same silent-loss issue for uploaded files. Removed entirely so dev
  # inherits `./volumes/storage:/var/lib/storage:z` from the base compose.
