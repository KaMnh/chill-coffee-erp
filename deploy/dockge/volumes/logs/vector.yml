# Minimal Vector config for Chill Coffee ERP self-hosted Supabase.
# Vector ships Docker container logs to Logflare (which lives in the analytics service).
# This stub keeps the container healthy. Replace with the official supabase/docker
# vector.yml from https://github.com/supabase/supabase/blob/master/docker/volumes/logs/vector.yml
# if you need full log shipping.

api:
  enabled: true
  address: 0.0.0.0:9001

sources:
  docker_host:
    type: docker_logs
    docker_host: ${DOCKER_SOCKET_LOCATION}

sinks:
  logflare:
    type: http
    method: post
    inputs:
      - docker_host
    uri: http://analytics:4000/api/logs?source_name=docker.events&api_key=${LOGFLARE_PUBLIC_ACCESS_TOKEN}
    encoding:
      codec: json
    request:
      retry_max_duration_secs: 10
